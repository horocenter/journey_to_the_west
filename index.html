<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ระบบเปิดไพ่ออนไลน์เสี่ยงทาย ทีมงาน Horocenter </title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #1a1a2e;
            color: #ffffff;
            text-align: center;
            padding: 20px;
            margin: 0;
        }
        .container {
            max-width: 900px; /* ขยายเพิ่มเล็กน้อยเพื่อให้รองรับ 3 ใบในแนวนอนได้ดีขึ้น */
            margin: 0 auto;
            background-color: #16161d;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.5);
            border: 1px solid #d4af37;
        }
        h1 {
            color: #d4af37;
            font-size: 24px;
            margin-bottom: 20px;
        }
        .card-container {
            display: flex;
            justify-content: center;
            gap: 15px;
            flex-wrap: wrap; /* รองรับหน้าจอมือถือ */
            margin: 20px 0;
        }
        .card-display {
            width: 280px; /* ปรับขนาดให้พอดีสำหรับแสดงผล 3 ใบ */
            height: 500px; 
            border: 2px dashed #d4af37;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            background-color: #0f0f1a;
            overflow: hidden;
        }
        .card-display img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .result-text {
            font-size: 16px;
            margin-top: 20px;
            min-height: 50px;
            color: #e0e0e0;
            line-height: 1.6;
            padding: 0 10px;
            text-align: left; /* เปลี่ยนเป็นชิดซ้ายเพื่อให้ดาวน์โหลดคำทำนาย 3 ใบอ่านง่าย */
        }
        .btn-random {
            background: linear-gradient(45deg, #d4af37, #aa7c11);
            color: #1a1a2e;
            border: none;
            padding: 12px 30px;
            font-size: 18px;
            font-weight: bold;
            border-radius: 25px;
            cursor: pointer;
            transition: 0.3s;
            box-shadow: 0 4px 15px rgba(212,175,55,0.3);
            margin-top: 15px;
        }
        .btn-random:hover {
            transform: scale(1.05);
            box-shadow: 0 6px 20px rgba(212,175,55,0.5);
        }
    </style>
</head>
<body>

<div class="container">
    <h1>🔮 มหาตำนานแห่งจิตวิญญาน ไซอิ๋ว 🔮</h1>
    
    <!-- รวบการแสดงผลไพ่ให้อยู่ใน Container เดียวกัน -->
    <div class="card-container">
        <div class="card-display" id="cardDisplay1">
            <img src="card-back.png" alt="หลังไพ่ใบที่ 1">
        </div>
        <div class="card-display" id="cardDisplay2">
            <img src="card-back.png" alt="หลังไพ่ใบที่ 2">
        </div>
        <div class="card-display" id="cardDisplay3">
            <img src="card-back.png" alt="หลังไพ่ใบที่ 3">
        </div>
    </div>
    
    <div class="result-text" id="resultText" style="text-align: center;">
        ตั้งจิตอธิษฐานนึกถึงเรื่องที่ต้องการถาม แล้วกดปุ่มสุ่มไพ่
    </div>
    
    <button class="btn-random" onclick="randomCard()">เปิดไพ่เสี่ยงทาย</button>
</div>

    function randomCard() {
        const textDiv = document.getElementById('resultText');
        textDiv.style.textAlign = "center";
        textDiv.innerHTML = "กำลังเปิดไพ่...";

        // ใส่เอฟเฟกต์รูป🔮 ระหว่างสุ่มให้ทั้ง 3 ช่อง
        for (let i = 1; i <= 3; i++) {
            document.getElementById(`cardDisplay${i}`).innerHTML = "<span style='font-size: 40px;'>🔮</span>";
        }

        setTimeout(() => {
            let resultHTML = "";
            
            // ลูปทำงาน 3 ครั้งเพื่อสุ่มไพ่ 3 ใบ
            for (let i = 1; i <= 3; i++) {
                const randomIndex = Math.floor(Math.random() * cardData.length);
                const selectedCard = cardData[randomIndex];
                const cardNumber = randomIndex + 1;

                // อัปเดตรูปภาพของไพ่แต่ละใบตาม ID (cardDisplay1, cardDisplay2, cardDisplay3)
                document.getElementById(`` + `cardDisplay${i}`).innerHTML = `<img src="card${cardNumber}.png" alt="${selectedCard.title}">`;
                
                // รวมข้อความคำทำนาย
                resultHTML += `<strong>ใบที่ ${i} - ${selectedCard.title}:</strong> ${selectedCard.meaning}<br><br>`;
            }

            // แสดงคำทำนายรวมของทั้ง 3 ใบ
            textDiv.style.textIndent = "0";
            textDiv.style.textAlign = "left";
            textDiv.innerHTML = resultHTML;
        }, 500);
    }
</script>
